services:
  oneauthwatch:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-dev}
        BUILD_TIME: ${BUILD_TIME:-}
    image: oneauthwatch:latest
    container_name: oneauthwatch

    # Port mapping: host:container
    ports:
      - "${ONEAUTHWATCH_PORT:-9211}:9211"

    # Volume mount for persistent SQLite database
    # Bind mount - pre-create with: mkdir -p ./oneauthwatch-data && chown -R 65532:65532 ./oneauthwatch-data
    volumes:
      - ./oneauthwatch-data:/data

    # Environment variables from .env file
    env_file:
      - .env

    # Override specific environment variables for Docker
    environment:
      # Force foreground mode in Docker (logs to stdout)
      ONEAUTHWATCH_DB_PATH: /data/oneauthwatch.db

    # Restart policy
    restart: unless-stopped

    # Resource limits (optional but recommended for background services)
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M

    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
