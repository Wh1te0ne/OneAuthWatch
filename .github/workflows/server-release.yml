name: Server Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0). Must already exist."
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: wh1te0ne/oneauthwatch

permissions:
  contents: write
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod

      - name: Test with race detection
        run: go test -race ./...

  build-standard:
    needs: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            binary: oneauthwatch-server-linux-amd64
          - goos: linux
            goarch: arm64
            binary: oneauthwatch-server-linux-arm64
          - goos: windows
            goarch: amd64
            binary: oneauthwatch-server-windows-amd64.exe
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -ldflags="-s -w -X main.version=${{ steps.version.outputs.version }}" \
            -o ${{ matrix.binary }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: server/${{ matrix.binary }}

  build-macos-amd64:
    needs: test
    runs-on: macos-15
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Build macOS amd64 artifact
        run: |
          CGO_ENABLED=1 GOOS=darwin GOARCH=amd64 go build \
            -tags menubar,desktop,production \
            -ldflags="-s -w -X main.version=${{ steps.version.outputs.version }}" \
            -o oneauthwatch-server-darwin-amd64 .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: oneauthwatch-server-darwin-amd64
          path: server/oneauthwatch-server-darwin-amd64

  build-macos-arm64:
    needs: test
    runs-on: macos-15
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Build macOS arm64 artifact
        run: |
          CGO_ENABLED=1 GOOS=darwin GOARCH=arm64 go build \
            -tags menubar,desktop,production \
            -ldflags="-s -w -X main.version=${{ steps.version.outputs.version }}" \
            -o oneauthwatch-server-darwin-arm64 .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: oneauthwatch-server-darwin-arm64
          path: server/oneauthwatch-server-darwin-arm64

  release:
    needs: [build-standard, build-macos-amd64, build-macos-arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Copy additional release files
        run: |
          cp server/install.bat dist/
          cp server/Dockerfile dist/
          cp server/docker-compose.yml dist/
          cp server/.env.docker.example dist/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "${{ inputs.tag }}" --yes 2>/dev/null || true
          gh release create "${{ inputs.tag }}" dist/* \
            --title "OneAuthWatch Server ${{ inputs.tag }}" \
            --generate-notes

  docker:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read version
        id: version
        working-directory: server
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Extract metadata for Alpine variant
        id: meta-alpine
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}-alpine,value=${{ inputs.tag }}
            type=semver,pattern={{major}}.{{minor}}-alpine,value=${{ inputs.tag }}
            type=raw,value=alpine

      - name: Build and push Docker image (Alpine with shell)
        uses: docker/build-push-action@v6
        with:
          context: server
          target: runtime-shell
          platforms: linux/arm64,linux/amd64
          push: true
          tags: ${{ steps.meta-alpine.outputs.tags }}
          labels: ${{ steps.meta-alpine.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha,scope=server-alpine
          cache-to: type=gha,mode=max,scope=server-alpine

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ inputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ inputs.tag }}
            type=semver,pattern={{major}},value=${{ inputs.tag }}
            type=raw,value=latest

      - name: Build and push Docker image (distroless)
        uses: docker/build-push-action@v6
        with:
          context: server
          target: runtime
          platforms: linux/arm64,linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha,scope=server-distroless
          cache-to: type=gha,mode=max,scope=server-distroless
