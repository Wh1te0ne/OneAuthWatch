name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            platform: macos-15
            rust-target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin --bundles dmg
          - name: macOS Intel
            platform: macos-15-intel
            rust-target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin --bundles dmg
          - name: Windows
            platform: windows-latest
            rust-target: ""
            args: ""

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        if: matrix.rust-target != ''
        run: rustup target add ${{ matrix.rust-target }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: OneAuthWatch v__VERSION__
          releaseBody: |
            修复内容：
            - 修复活跃账号的本地 auth 快照未随 `~/.codex/auth.json` 自动刷新，导致账号可正常使用但被误判为 “Token 已过期或无效”
            - 刷新当前活跃账号用量前，会先同步最新登录凭证，再请求 `wham/usage`
            - 安装包由 GitHub Actions 自动构建并附加到当前 Release
          generateReleaseNotes: false
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
